name: Publish to Dev.to on push

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate and publish Dev.to article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, os, subprocess

          # Get commit context
          commit_msg = subprocess.check_output(["git", "log", "-1", "--pretty=%B"]).decode().strip()
          changed = subprocess.check_output(["git", "diff", "--name-only", "HEAD~1", "HEAD"]).decode().strip()

          # Read changed skill files
          skill_content = ""
          for f in changed.splitlines():
              if "SKILL.md" in f and os.path.exists(f):
                  content = open(f).read()[:2000]
                  skill_content += f"\n\n## {f}\n{content}"

          prompt = f"""You are a technical writer for Dev.to. A new commit was pushed to the hermes-skills GitHub repo (open-source skills for Hermes AI agent).

Commit: {commit_msg}
Changed files: {changed}

Skill content:
{skill_content if skill_content else "(no skill files changed — general update)"}

Write a short Dev.to article (300-500 words) in English about this update.
- Engaging title (no clickbait)
- Brief intro: what problem this solves
- How it works (include a short code/markdown snippet if relevant)
- How to use it with Hermes AI agent
- End with a CTA to star the repo

Return ONLY valid JSON: {{"title": "...", "body_markdown": "...", "tags": ["tag1","tag2","tag3","tag4"]}}
Tags must be from this set: hermes, ai, automation, productivity, seo, wordpress, marketing, opensource, python, agile"""

          payload = json.dumps({
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 1500,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )
          resp = json.loads(urllib.request.urlopen(req).read())
          text = resp["content"][0]["text"].strip()

          # Parse JSON (Claude may wrap in ```json)
          if "```" in text:
              text = text.split("```")[1]
              if text.startswith("json"):
                  text = text[4:]
          article = json.loads(text.strip())

          # Publish to Dev.to
          payload2 = json.dumps({
              "article": {
                  "title": article["title"],
                  "body_markdown": article["body_markdown"],
                  "published": True,
                  "tags": article["tags"][:4]
              }
          }).encode()

          req2 = urllib.request.Request(
              "https://dev.to/api/articles",
              data=payload2,
              headers={
                  "api-key": os.environ["DEVTO_API_KEY"],
                  "Content-Type": "application/json"
              }
          )
          resp2 = json.loads(urllib.request.urlopen(req2).read())
          url = resp2.get("url", "")
          if url:
              print(f"Published: {url}")
          else:
              print(f"Error: {resp2}")
          PYEOF
